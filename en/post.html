<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post to Reddit — US Proxy | FinKit</title>
  <meta name="robots" content="noindex">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #0a0e14; color: #e6e9ef; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #12171f; border: 1px solid #1e2736; border-radius: 16px; padding: 32px; max-width: 520px; width: 100%; margin: 24px; }
    h1 { font-size: 1.3rem; margin-bottom: 4px; }
    .sub { color: #5a6377; font-size: 0.85rem; margin-bottom: 24px; }
    label { display: block; font-size: 0.82rem; color: #8a94a6; margin-bottom: 4px; margin-top: 16px; }
    input, textarea, select { width: 100%; padding: 10px 12px; background: #1a1f2e; border: 1px solid #252d3a; border-radius: 8px; color: #e6e9ef; font-family: inherit; font-size: 0.9rem; outline: none; }
    input:focus, textarea:focus, select:focus { border-color: #4ae08a; }
    textarea { resize: vertical; min-height: 80px; }
    button { width: 100%; margin-top: 20px; padding: 12px; background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .result { margin-top: 16px; padding: 14px; border-radius: 8px; font-size: 0.85rem; display: none; }
    .result.success { display: block; background: rgba(74,224,138,0.08); border: 1px solid rgba(74,224,138,0.2); color: #4ae08a; }
    .result.error { display: block; background: rgba(240,80,80,0.08); border: 1px solid rgba(240,80,80,0.2); color: #f05050; }
    .result a { color: #4ae08a; }
    .setup-note { margin-top: 20px; padding: 14px; background: rgba(201,168,76,0.06); border: 1px solid rgba(201,168,76,0.15); border-radius: 8px; font-size: 0.8rem; color: #9e947c; }
    .setup-note code { color: #f0d060; background: rgba(0,0,0,0.3); padding: 1px 5px; border-radius: 3px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🛡️ Post to Reddit (US IP)</h1>
    <p class="sub">Your post goes through Vercel's US server — Reddit sees an American IP</p>

    <div class="setup-note" id="setupNote">
      ⚠️ <strong>First-time setup needed:</strong> Set 4 env vars in Vercel:<br>
      <code>REDDIT_USER</code> <code>REDDIT_PASS</code> <code>REDDIT_CLIENT</code> <code>REDDIT_SECRET</code><br>
      <a href="https://old.reddit.com/prefs/apps/" target="_blank" style="color:#f0d060;">Create Reddit app →</a> (type: "script", redirect: http://localhost)
    </div>

    <form id="postForm">
      <label>Subreddit (no r/)</label>
      <input type="text" id="subreddit" value="SideProject" required>

      <label>Title</label>
      <input type="text" id="title" required>

      <label>URL or Text</label>
      <textarea id="content" required></textarea>

      <button type="submit" id="submitBtn">🚀 Post to Reddit (via US IP)</button>
    </form>

    <div class="result" id="result"></div>
  </div>

  <script>
    document.getElementById('postForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const result = document.getElementById('result');
      btn.disabled = true;
      btn.textContent = 'Posting...';
      result.className = 'result';
      result.style.display = 'none';

      try {
        const res = await fetch('/api/reddit-post', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            subreddit: document.getElementById('subreddit').value.trim(),
            title: document.getElementById('title').value.trim(),
            content: document.getElementById('content').value.trim()
          })
        });
        const data = await res.json();
        if (data.success) {
          result.className = 'result success';
          result.innerHTML = `✅ Posted! <a href="${data.url}" target="_blank">${data.url}</a>`;
        } else {
          result.className = 'result error';
          result.textContent = '❌ ' + (data.error || 'Unknown error') + (data.detail ? ': ' + JSON.stringify(data.detail) : '');
        }
      } catch (err) {
        result.className = 'result error';
        result.textContent = '❌ Network error: ' + err.message;
      } finally {
        btn.disabled = false;
        btn.textContent = '🚀 Post to Reddit (via US IP)';
      }
    });
  </script>
</body>
</html>
