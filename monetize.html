<script>
// Show Pro teaser after 30 seconds of engagement
let proTimer = null;
function resetProTimer() {
  if (proTimer) clearTimeout(proTimer);
  proTimer = setTimeout(() => {
    const teaser = document.getElementById('proTeaser');
    if (teaser && !sessionStorage.getItem('proTeaserDismissed')) {
      teaser.style.display = 'block';
    }
  }, 30000);
}
document.addEventListener('click', resetProTimer);
document.addEventListener('scroll', resetProTimer);
resetProTimer();

// Track engagement for AdSense optimization
(function() {
  var startTime = Date.now();
  window.addEventListener('beforeunload', function() {
    var duration = Math.round((Date.now() - startTime) / 1000);
    // In production, send to analytics
    console.log('[FinKit] Session: ' + duration + 's');
  });
})();
</script>
