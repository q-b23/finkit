<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="免费贷款对比计算器 — 同时比较多笔贷款方案，月供、总利息、总成本横向对比，找到最优贷款">
  <meta name="keywords" content="贷款对比,房贷计算,车贷,贷款方案,月供计算,贷款利率">
  <meta property="og:title" content="LoanCompare · 贷款方案对比">
  <meta property="og:description" content="多方案贷款对比，月供、总利息一目了然">
  <meta property="og:type" content="website">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="免费贷款对比计算器 — 同时对比多笔贷款方案，月供、总利息、总成本一目了然">
  <title>LoanCompare · 贷款方案对比</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-brand">
        <svg class="logo-icon" viewBox="0 0 32 32" fill="none">
          <rect x="4" y="8" width="24" height="16" rx="3" stroke="currentColor" stroke-width="2"/>
          <line x1="10" y1="14" x2="22" y2="14" stroke="currentColor" stroke-width="1.5"/>
          <line x1="10" y1="18" x2="18" y2="18" stroke="currentColor" stroke-width="1.5"/>
        </svg>
        <h1>Loan<span>Compare</span></h1>
      </div>
      <p class="header-sub">同时对比多笔贷款方案 · 找到最优贷款</p>
    </header>

    <div class="layout">
      <aside class="panel panel-input">
        <div class="panel-header">
          <h2>贷款方案</h2>
          <button class="btn btn-add" id="btnAddLoan">+ 添加方案</button>
        </div>

        <div id="loanList">
          <!-- Loan cards injected by JS -->
        </div>

        <div class="empty-state" id="emptyState">
          <p style="color:var(--text-muted);text-align:center;padding:40px 0;">点击「+ 添加方案」开始对比</p>
        </div>

        <button class="btn btn-primary btn-full" id="btnCompare" style="display:none;">
          开始对比
        </button>
      </aside>

      <main class="panel panel-results" id="resultsPanel">
        <div class="results-placeholder">
          <div class="placeholder-icon">
            <svg viewBox="0 0 64 64" fill="none">
              <rect x="8" y="16" width="20" height="32" rx="2" stroke="currentColor" stroke-width="2"/>
              <rect x="36" y="24" width="20" height="24" rx="2" stroke="currentColor" stroke-width="2"/>
              <rect x="8" y="16" width="20" height="10" rx="2" stroke="currentColor" stroke-width="2" fill="currentColor" opacity="0.15"/>
            </svg>
          </div>
          <p>添加至少两个贷款方案，点击对比查看详情</p>
        </div>

        <div class="results-content" id="resultsContent" style="display:none;"></div>
      </main>
    </div>

    <footer class="footer">
      <p>LoanCompare &copy; 2026 · 仅供参考，不构成贷款建议</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
