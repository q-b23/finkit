<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LoanCompare — FinKit</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950">
<div id="root"></div>

<script src="https://unpkg.com/react@19/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@19/umd/react-dom.development.js" crossorigin></script>
<script type="text/babel">
const { useState, useMemo } = React;

const fmt = (n) => {
  if (n >= 1_000_000) return "$" + (n / 1_000_000).toFixed(2) + "M";
  return "$" + n.toLocaleString("en-US", { maximumFractionDigits: 0 });
};

const fmtTerm = (months) => {
  const y = Math.floor(months / 12);
  const m = months % 12;
  if (y && m) return `${y}y ${m}mo`;
  if (y) return `${y}y`;
  return `${m}mo`;
};

function calcPMT(principal, annualRate, months) {
  const r = annualRate / 100 / 12;
  if (r === 0) return principal / months;
  return (principal * r * Math.pow(1 + r, months)) / (Math.pow(1 + r, months) - 1);
}

const PlusIcon = () => (
  <svg className="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
    <line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" />
  </svg>
);

function App() {
  const [dark, setDark] = useState(true);
  const [loans, setLoans] = useState([
    { id: 1, name: "Bank A — 30yr Fixed", principal: 350000, rate: 6.25, term: 360 },
    { id: 2, name: "Bank B — 15yr Fixed", principal: 350000, rate: 5.50, term: 180 },
    { id: 3, name: "Credit Union — 30yr", principal: 350000, rate: 6.00, term: 360 },
  ]);

  const addLoan = () => {
    const id = Math.max(0, ...loans.map(l => l.id)) + 1;
    const letters = "DEFGHIJK";
    setLoans([...loans, { id, name: `Lender ${letters[loans.length - 3] || "D"}`, principal: 350000, rate: 6.5, term: 360 }]);
  };

  const removeLoan = (id) => setLoans(loans.filter(l => l.id !== id));

  const updateLoan = (id, field, value) => {
    setLoans(loans.map(l => l.id === id ? { ...l, [field]: field === "name" ? value : parseFloat(value) || 0 } : l));
  };

  const results = useMemo(() => {
    return loans.map(l => {
      const monthly = calcPMT(l.principal, l.rate, l.term);
      const totalPaid = monthly * l.term;
      const totalInterest = totalPaid - l.principal;
      return { ...l, monthly: +monthly.toFixed(2), totalPaid: +totalPaid.toFixed(2), totalInterest: +totalInterest.toFixed(2), interestPct: +((totalInterest / totalPaid) * 100).toFixed(1) };
    });
  }, [loans]);

  const bestMonthly = useMemo(() => results.reduce((a, b) => a.monthly < b.monthly ? a : b, results[0]), [results]);
  const bestTotal = useMemo(() => results.reduce((a, b) => a.totalPaid < b.totalPaid ? a : b, results[0]), [results]);
  const bestInterest = useMemo(() => results.reduce((a, b) => a.totalInterest < b.totalInterest ? a : b, results[0]), [results]);

  // Composite score (lower = better)
  const scored = useMemo(() => {
    const rank = (arr, key) => { const s = [...arr].sort((a,b) => a[key]-b[key]); return new Map(s.map((x,i) => [x.id, i+1])); };
    const rM = rank(results, "monthly");
    const rT = rank(results, "totalPaid");
    const rI = rank(results, "totalInterest");
    return results.map(l => ({ ...l, score: (rM.get(l.id)||0) + (rT.get(l.id)||0) + (rI.get(l.id)||0) })).sort((a,b) => a.score - b.score);
  }, [results]);

  const bestOverall = scored[0];

  const cols = [
    { label: "Monthly Payment", key: "monthly", best: bestMonthly, fmt: (v) => fmt(v) + "/mo" },
    { label: "Total Interest", key: "totalInterest", best: bestInterest, fmt: (v) => fmt(v) },
    { label: "Total Cost", key: "totalPaid", best: bestTotal, fmt: (v) => fmt(v) },
    { label: "Interest %", key: "interestPct", best: null, fmt: (v) => v + "%" },
  ];

  return (
    <div className={dark ? "dark" : ""}>
      <div className="min-h-screen bg-zinc-50 dark:bg-zinc-950 transition-colors">

        {/* Navbar */}
        <nav className="flex items-center justify-between border-b border-zinc-200 bg-white px-6 py-3 dark:border-zinc-800 dark:bg-zinc-950">
          <div className="flex items-center gap-3">
            <a href="#" className="text-sm text-zinc-400 hover:text-zinc-600 dark:text-zinc-500 dark:hover:text-zinc-300">← Tools</a>
            <span className="text-lg font-semibold tracking-tight text-zinc-900 dark:text-zinc-100">Loan Comparison</span>
          </div>
          <button onClick={() => setDark(!dark)} className="rounded-full border border-zinc-200 px-3 py-1 text-xs font-medium text-zinc-500 hover:bg-zinc-50 dark:border-zinc-700 dark:text-zinc-400 dark:hover:bg-zinc-700">{dark ? "☀️" : "🌙"}</button>
        </nav>

        <main className="mx-auto max-w-6xl px-4 py-8 sm:px-6">
          <div className="grid gap-8 lg:grid-cols-[420px_1fr]">

            {/* Left — Loan Options */}
            <div className="space-y-4">
              <div className="flex items-center justify-between">
                <div>
                  <h2 className="text-lg font-semibold tracking-tight text-zinc-900 dark:text-zinc-100">Loan Options</h2>
                  <p className="text-xs text-zinc-400 dark:text-zinc-500">Add each offer to compare.</p>
                </div>
                <button onClick={addLoan} className="flex items-center gap-1.5 rounded-lg border border-zinc-300 bg-white px-3 py-2 text-xs font-medium text-zinc-600 shadow-sm hover:border-zinc-400 hover:bg-zinc-50 dark:border-zinc-700 dark:bg-zinc-800 dark:text-zinc-300 dark:hover:border-zinc-600 dark:hover:bg-zinc-700">
                  <PlusIcon /> Add Offer
                </button>
              </div>

              <div className="max-h-[500px] space-y-3 overflow-y-auto pr-1">
                {loans.map((loan, i) => (
                  <div key={loan.id} className="group relative rounded-xl border border-zinc-200 bg-white p-4 shadow-sm dark:border-zinc-800 dark:bg-zinc-900">
                    {loans.length > 1 && (
                      <button onClick={() => removeLoan(loan.id)} className="absolute right-3 top-3 rounded-md p-1 text-zinc-300 opacity-0 hover:bg-red-50 hover:text-red-500 group-hover:opacity-100 dark:text-zinc-600 dark:hover:bg-red-950 dark:hover:text-red-400" title="Remove">
                        <svg className="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polyline points="3 6 5 6 21 6" /><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" /></svg>
                      </button>
                    )}
                    <input type="text" value={loan.name} onChange={(e) => updateLoan(loan.id, "name", e.target.value)} className="mb-3 w-full border-0 bg-transparent text-sm font-semibold text-zinc-900 outline-none dark:text-zinc-100" />
                    <div className="grid grid-cols-3 gap-3">
                      {[
                        { key: "principal", label: "Amount", prefix: "$", placeholder: "350,000" },
                        { key: "rate", label: "APR", suffix: "%", placeholder: "6.25" },
                        { key: "term", label: "Term", suffix: "mo", placeholder: "360" },
                      ].map(f => (
                        <div key={f.key}>
                          <label className="mb-1 block text-xs font-medium text-zinc-400 dark:text-zinc-500">{f.label}</label>
                          <div className="flex items-center rounded-lg border border-zinc-200 bg-zinc-50 px-2.5 py-1.5 focus-within:border-zinc-400 dark:border-zinc-700 dark:bg-zinc-800 dark:focus-within:border-zinc-500">
                            {f.prefix && <span className="mr-0.5 text-xs text-zinc-400 dark:text-zinc-500">{f.prefix}</span>}
                            <input type="number" value={loan[f.key] || ""} onChange={(e) => updateLoan(loan.id, f.key, e.target.value)} placeholder={f.placeholder} min="0" step={f.key === "rate" ? "0.01" : f.key === "term" ? "12" : "1000"} className="w-full border-0 bg-transparent text-sm text-zinc-900 outline-none placeholder:text-zinc-300 dark:text-zinc-100 dark:placeholder:text-zinc-600 [&::-webkit-inner-spin-button]:opacity-100" />
                            {f.suffix && <span className="ml-0.5 text-xs text-zinc-400 dark:text-zinc-500">{f.suffix}</span>}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* Right — Results */}
            <div className="space-y-5">
              {/* Recommendation */}
              {bestOverall && (
                <div className="rounded-2xl border border-emerald-200 bg-emerald-50/40 px-5 py-4 dark:border-emerald-800 dark:bg-emerald-950/20">
                  <p className="text-sm text-emerald-700 dark:text-emerald-300">
                    <strong>{bestOverall.name}</strong> has the best overall score.
                    Monthly: <strong>{fmt(bestOverall.monthly)}/mo</strong> · Total cost: <strong>{fmt(bestOverall.totalPaid)}</strong>.
                  </p>
                </div>
              )}

              {/* Comparison Table */}
              <div className="overflow-x-auto rounded-2xl border border-zinc-200 bg-white shadow-sm dark:border-zinc-800 dark:bg-zinc-900">
                <table className="w-full text-sm">
                  <thead>
                    <tr className="border-b border-zinc-200 dark:border-zinc-700">
                      <th className="px-5 py-3 text-left text-xs font-semibold uppercase tracking-wider text-zinc-400 dark:text-zinc-500">Offer</th>
                      <th className="px-5 py-3 text-left text-xs font-semibold uppercase tracking-wider text-zinc-400 dark:text-zinc-500">Amount</th>
                      <th className="px-5 py-3 text-left text-xs font-semibold uppercase tracking-wider text-zinc-400 dark:text-zinc-500">APR</th>
                      <th className="px-5 py-3 text-left text-xs font-semibold uppercase tracking-wider text-zinc-400 dark:text-zinc-500">Term</th>
                      <th className="px-5 py-3 text-right text-xs font-semibold uppercase tracking-wider text-zinc-400 dark:text-zinc-500">Monthly</th>
                      <th className="px-5 py-3 text-right text-xs font-semibold uppercase tracking-wider text-zinc-400 dark:text-zinc-500">Total Interest</th>
                      <th className="px-5 py-3 text-right text-xs font-semibold uppercase tracking-wider text-zinc-400 dark:text-zinc-500">Total Cost</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-zinc-100 dark:divide-zinc-800">
                    {scored.map((l) => (
                      <tr key={l.id} className={`transition-colors hover:bg-zinc-50 dark:hover:bg-zinc-800/50 ${l.id === bestOverall.id ? "bg-emerald-50/20 dark:bg-emerald-950/10" : ""}`}>
                        <td className="px-5 py-3">
                          <span className="font-medium text-zinc-900 dark:text-zinc-100">{l.name}</span>
                          {l.id === bestOverall.id && <span className="ml-2 rounded-full bg-emerald-100 px-2 py-0.5 text-xs font-medium text-emerald-700 dark:bg-emerald-900 dark:text-emerald-300">Best</span>}
                        </td>
                        <td className="px-5 py-3 text-zinc-700 dark:text-zinc-300">{fmt(l.principal)}</td>
                        <td className="px-5 py-3 text-zinc-700 dark:text-zinc-300">{l.rate}%</td>
                        <td className="px-5 py-3 text-zinc-700 dark:text-zinc-300">{fmtTerm(l.term)}</td>
                        <td className={`px-5 py-3 text-right font-mono font-medium ${l.id === bestMonthly.id ? "text-emerald-600 dark:text-emerald-400" : "text-zinc-700 dark:text-zinc-300"}`}>{fmt(l.monthly)}</td>
                        <td className={`px-5 py-3 text-right font-mono ${l.id === bestInterest.id ? "text-emerald-600 dark:text-emerald-400" : "text-zinc-700 dark:text-zinc-300"}`}>{fmt(l.totalInterest)}</td>
                        <td className={`px-5 py-3 text-right font-mono font-medium ${l.id === bestTotal.id ? "text-emerald-600 dark:text-emerald-400" : "text-zinc-900 dark:text-zinc-100"}`}>{fmt(l.totalPaid)}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>

              {/* Cost Bar Chart */}
              <div className="rounded-2xl border border-zinc-200 bg-white p-5 shadow-sm dark:border-zinc-800 dark:bg-zinc-900">
                <h3 className="mb-4 text-sm font-semibold text-zinc-700 dark:text-zinc-300">Cost Breakdown by Loan</h3>
                {scored.map((l) => {
                  const maxTotal = Math.max(...scored.map(x => x.totalPaid));
                  const principalPct = (l.principal / l.totalPaid) * 100;
                  const interestPct = (l.totalInterest / l.totalPaid) * 100;
                  const barWidth = (l.totalPaid / maxTotal) * 100;
                  return (
                    <div key={l.id} className="mb-3 last:mb-0">
                      <div className="mb-1 flex justify-between text-xs">
                        <span className="font-medium text-zinc-600 dark:text-zinc-400">{l.name}</span>
                        <span className="text-zinc-400 dark:text-zinc-500">{fmt(l.totalPaid)}</span>
                      </div>
                      <div className="h-6 w-full overflow-hidden rounded-md bg-zinc-100 dark:bg-zinc-800">
                        <div className="flex h-full" style={{ width: `${barWidth}%` }}>
                          <div className="flex h-full items-center justify-end bg-zinc-700 px-2 text-xs font-medium text-white dark:bg-zinc-300 dark:text-zinc-800" style={{ width: `${principalPct}%` }}>
                            {principalPct > 15 && "Principal"}
                          </div>
                          <div className="flex h-full items-center justify-start bg-amber-400 px-2 text-xs font-medium text-amber-900" style={{ width: `${interestPct}%` }}>
                            {interestPct > 15 && "Interest"}
                          </div>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>

          <p className="mt-12 text-center text-xs text-zinc-400 dark:text-zinc-500">All calculations happen locally in your browser. We never store or share your financial data.</p>
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
