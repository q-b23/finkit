<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Preview — FinKit</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950">

<div id="root"></div>

<script src="https://unpkg.com/react@19/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@19/umd/react-dom.development.js" crossorigin></script>
<script type="text/babel">
const { useState } = React;

const tools = [
  { id: "debt", name: "Debt Payoff Planner", description: "Compare snowball vs avalanche strategies. See your exact debt-free date and track every milestone.", icon: "📋", href: "#", tags: ["Snowball vs Avalanche", "Amortization Table", "CSV Export"], accent: "bg-emerald-500" },
  { id: "loan", name: "Loan Comparison", description: "Compare multiple loan offers side by side. Monthly payments, total cost, and a composite score for the best deal.", icon: "🏦", href: "#", tags: ["Multi-Loan Compare", "PMT Calculator", "Visual Charts"], accent: "bg-blue-500" },
  { id: "fire", name: "FIRE Calculator", description: "Project compound growth, find your FIRE number, and discover your Coast FIRE age — all inflation-adjusted.", icon: "🔥", href: "#", tags: ["Compound Growth", "4% Rule", "Coast FIRE"], accent: "bg-amber-500" },
];

function Dashboard() {
  const [dark, setDark] = useState(false);
  const hour = new Date().getHours();
  const greeting = hour < 12 ? "Good morning" : hour < 18 ? "Good afternoon" : "Good evening";

  return (
    <div className={dark ? "dark" : ""}>
      <div className="min-h-screen bg-zinc-50 dark:bg-zinc-950 transition-colors">

        {/* Navbar */}
        <nav className="flex items-center justify-between border-b border-zinc-200 bg-white px-6 py-3 dark:border-zinc-800 dark:bg-zinc-950 transition-colors">
          <span className="text-lg font-semibold tracking-tight text-zinc-900 dark:text-zinc-100">FinKit</span>
          <div className="flex items-center gap-3">
            <button
              onClick={() => setDark(!dark)}
              className="rounded-full border border-zinc-200 bg-white px-3 py-1 text-xs font-medium text-zinc-500 hover:bg-zinc-50 dark:border-zinc-700 dark:bg-zinc-800 dark:text-zinc-400 dark:hover:bg-zinc-700"
            >
              {dark ? "☀️ Light" : "🌙 Dark"}
            </button>
            <span className="text-sm text-zinc-400 dark:text-zinc-500">Jun 14, 2026</span>
            <div className="h-8 w-8 rounded-full bg-zinc-200 dark:bg-zinc-700" />
          </div>
        </nav>

        <main className="mx-auto max-w-4xl px-4 py-10 sm:px-6">

          {/* Greeting */}
          <div className="mb-8">
            <h1 className="text-2xl font-semibold tracking-tight text-zinc-900 dark:text-zinc-100">{greeting}</h1>
            <p className="mt-1 text-sm text-zinc-500 dark:text-zinc-400">Choose a tool to start planning your financial future.</p>
          </div>

          {/* Stats */}
          <div className="grid grid-cols-3 gap-4">
            {[{ value: "3", label: "Core Tools" }, { value: "0", label: "Data Uploaded" }, { value: "100%", label: "Open Source" }].map(s => (
              <div key={s.label} className="rounded-xl border border-zinc-200 bg-white px-4 py-5 text-center dark:border-zinc-800 dark:bg-zinc-900 transition-colors">
                <p className="text-2xl font-semibold tracking-tight text-zinc-900 dark:text-zinc-100">{s.value}</p>
                <p className="mt-1 text-xs text-zinc-500 dark:text-zinc-400">{s.label}</p>
              </div>
            ))}
          </div>

          {/* Tools */}
          <div className="mt-8">
            <h2 className="mb-4 text-sm font-semibold uppercase tracking-wider text-zinc-400 dark:text-zinc-500">Your Tools</h2>
            <div className="grid gap-5 sm:grid-cols-2 lg:grid-cols-3">
              {tools.map(tool => (
                <a key={tool.id} href={tool.href} className="group relative flex flex-col rounded-2xl border border-zinc-200 bg-white p-6 shadow-sm transition-all hover:-translate-y-1 hover:border-zinc-300 hover:shadow-md dark:border-zinc-800 dark:bg-zinc-900 dark:hover:border-zinc-700">
                  <div className={`absolute inset-x-0 top-0 h-1 rounded-t-2xl ${tool.accent}`} />
                  <span className="mb-4 text-2xl">{tool.icon}</span>
                  <h3 className="text-lg font-semibold tracking-tight text-zinc-900 dark:text-zinc-100">{tool.name}</h3>
                  <p className="mt-2 flex-1 text-sm leading-relaxed text-zinc-500 dark:text-zinc-400">{tool.description}</p>
                  <div className="mt-4 flex flex-wrap gap-2">
                    {tool.tags.map(tag => (
                      <span key={tag} className="rounded-md border border-zinc-200 bg-zinc-50 px-2 py-0.5 text-xs text-zinc-500 dark:border-zinc-700 dark:bg-zinc-800 dark:text-zinc-400">{tag}</span>
                    ))}
                  </div>
                </a>
              ))}
            </div>
          </div>

          {/* Footer */}
          <p className="mt-12 text-center text-xs text-zinc-400 dark:text-zinc-500">
            All calculations happen locally in your browser.<br />
            We never store or share your financial data.{" "}
            <a href="https://github.com/q-b23/finkit" className="underline underline-offset-2 hover:text-zinc-600 dark:hover:text-zinc-300">Verify on GitHub</a>
          </p>
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard />);
</script>


<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

</body>
</html>
